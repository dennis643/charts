name: Daily report refresh

# Pulls the latest data.json from the upstream report repo (dchatham/candosa-report),
# regenerates index.html with build.js, and commits the result to main.
# Only commits when the upstream data actually changed, so unchanged days are no-ops.

on:
  schedule:
    - cron: "23 11 * * *"   # daily at ~11:23 UTC
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-report-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pull latest data.json from candosa-report
        run: curl -fsSL https://raw.githubusercontent.com/dchatham/candosa-report/main/data.json -o data.json

      - name: Rebuild and push if the data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No new data from candosa-report; nothing to publish."
            exit 0
          fi
          node build.js
          git add index.html
          git commit -m "Daily report refresh: $(date -u +%F)"
          git push
